workflows:
  android-build:
    name: Native Android Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      java: 17
      node: 20
      vars:
        APP_URL: "https://example.com"
        APP_NAME: "MyApp"
        APP_PACKAGE_NAME: "com.droidify.myapp"
    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build Web Assets
        script: |
          # Ensure web assets are built before Capacitor tries to sync them
          npm run build --if-present

      - name: Configure app
        script: |
          node scripts/configure.js

      - name: Add Android platform
        script: |
          npx cap add android || true
          npx cap sync android

      - name: Set Android permissions
        script: |
          node scripts/set-permissions.js

      - name: Apply native enhancements
        script: |
          node scripts/enhance-native.js

      - name: Configure release signing
        script: |
          # Generate a keystore only if it doesn't exist
          KEYSTORE_PATH="$HOME/.android/debug.keystore"
          if [ ! -f "$KEYSTORE_PATH" ]; then
            mkdir -p "$HOME/.android"
            keytool -genkey -v -keystore "$KEYSTORE_PATH" \
              -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Debug,OU=Debug,O=Debug,L=Debug,ST=Debug,C=US"
          fi

          export KEYSTORE_PATH
          python3 <<'PY'
          import os
          import re
          from pathlib import Path

          gradle_file = Path("android/app/build.gradle")
          if not gradle_file.exists():
              print("Warning: android/app/build.gradle not found. Skipping injection.")
              exit(0)

          text = gradle_file.read_text()
          
          # Configuration block to inject
          signing_config = f'''
    signingConfigs {{
        release {{
            storeFile file("{os.environ["KEYSTORE_PATH"]}")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }}
    }}
'''
          # 1. Inject signingConfigs before buildTypes
          if "signingConfigs {" not in text:
              text = re.sub(r"(buildTypes\s*\{)", signing_config + r"\1", text)

          # 2. Inject the signingConfig reference into the release block
          # Matches 'release {' and ensures we don't double-inject
          if "signingConfig signingConfigs.release" not in text:
              text = re.sub(r"(release\s*\{)", r"\1\n            signingConfig signingConfigs.release", text)

          gradle_file.write_text(text)
          PY

      - name: Build Android AAB and APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease assembleRelease

    artifacts:
      - android/app/build/outputs/bundle/**/*.aab
      - android/app/build/outputs/apk/**/*.apk

    publishing:
      email:
        recipients:
          - builds@droidify.app
        notify:
          success: false
          failure: true
